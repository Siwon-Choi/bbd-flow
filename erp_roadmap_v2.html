<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현대 파츠 ERP — 호출 플로우</title>
<style>
  :root {
    --bg: #101210;
    --panel: #181b19;
    --panel-2: #20241f;
    --panel-3: #252a25;
    --line: #333a33;
    --line-strong: #5f6b60;
    --text: #f1f4ef;
    --muted: #9aa39a;
    --soft: #c7cec4;
    --green: #48b86b;
    --teal: #40bfc1;
    --amber: #e7b84f;
    --coral: #e36f5b;
    --blue: #5b8def;
    --shadow: 0 22px 60px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0;
  }

  button { font: inherit; }
  .wrap {
    width: min(1380px, calc(100vw - 36px));
    margin: 0 auto;
    padding: 30px 0 54px;
  }

  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 22px;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--teal);
    font-size: .76rem;
    font-weight: 800;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.55rem, 2.3vw, 2.3rem);
    line-height: 1.1;
    letter-spacing: 0;
  }
  .header-copy {
    margin: 10px 0 0;
    max-width: 680px;
    color: var(--muted);
    line-height: 1.5;
    font-size: .9rem;
  }
  .summary-pill {
    flex: 0 0 auto;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--soft);
    border-radius: 999px;
    padding: 9px 13px;
    font-size: .82rem;
    white-space: nowrap;
  }

  .flow-tabs {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .flow-tab {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: border-color .2s, background .2s, color .2s, transform .2s;
  }
  .flow-tab:hover { border-color: var(--line-strong); color: var(--text); }
  .flow-tab.active {
    color: var(--text);
    border-color: var(--flow);
    background: color-mix(in srgb, var(--flow) 12%, var(--panel));
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--flow) 34%, transparent);
  }
  .flow-tab b { display: block; font-size: .94rem; margin-bottom: 3px; }
  .flow-tab span { display: block; font-size: .74rem; line-height: 1.35; }

  .stage-rail {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 0 0 18px;
  }
  .stage-btn {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    border-radius: 999px;
    padding: 9px 14px;
    cursor: pointer;
    transition: all .2s;
    min-width: 92px;
  }
  .stage-btn.done {
    color: var(--soft);
    border-color: color-mix(in srgb, var(--flow) 45%, var(--line));
    background: color-mix(in srgb, var(--flow) 7%, var(--panel));
  }
  .stage-btn.active {
    color: #0b110d;
    background: var(--flow);
    border-color: var(--flow);
    font-weight: 800;
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--flow) 22%, transparent),
                0 14px 34px color-mix(in srgb, var(--flow) 28%, transparent);
  }

  .workspace {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 18px;
    align-items: start;
  }

  .board, .detail {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .board { min-height: 650px; overflow: hidden; }
  .board-head {
    padding: 22px 26px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: start;
  }
  .board-title h2 {
    margin: 0;
    font-size: 1.18rem;
    line-height: 1.25;
  }
  .board-title p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: .83rem;
    line-height: 1.45;
    max-width: 760px;
  }
  .flow-badge {
    flex: 0 0 auto;
    border: 1px solid color-mix(in srgb, var(--flow) 46%, var(--line));
    background: color-mix(in srgb, var(--flow) 13%, var(--panel-2));
    color: var(--text);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: .78rem;
    font-weight: 800;
  }

  .actor-strip {
    display: grid;
    grid-template-columns: repeat(var(--count), minmax(0, 1fr));
    gap: 10px;
    padding: 26px 26px 18px;
  }
  .actor-cell {
    position: relative;
    display: grid;
    justify-items: center;
    gap: 9px;
    min-width: 0;
  }
  .actor-cell:not(:last-child)::after {
    display: none;
  }
  .actor-cell.edge-on:not(:last-child)::after {
    background: var(--line);
  }
  .actor-mark {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    position: relative;
    z-index: 1;
    border: 1px solid var(--line);
    background: #f6f7f4;
    color: var(--muted);
    font-weight: 900;
    font-size: .74rem;
  }
  .actor-mark img,
  .sequence-icon img {
    width: 30px;
    height: 30px;
    object-fit: contain;
    display: block;
  }
  .actor-cell.on .actor-mark {
    border-color: var(--flow);
    background: #fff;
    color: var(--text);
  }
  .actor-cell.focus .actor-mark {
    color: #08100b;
    background: #fff;
    border-color: var(--flow);
    box-shadow: 0 0 0 6px color-mix(in srgb, var(--flow) 18%, transparent),
                0 0 34px color-mix(in srgb, var(--flow) 48%, transparent);
    transform: scale(1.08);
  }
  .actor-name {
    text-align: center;
    color: var(--muted);
    font-size: .78rem;
    line-height: 1.3;
    min-height: 32px;
  }
  .actor-cell.on .actor-name { color: var(--soft); }

  .message-map {
    padding: 0 26px 16px;
  }
  .message-box {
    border: 1px solid color-mix(in srgb, var(--flow) 35%, var(--line));
    border-radius: 16px;
    background: rgba(0,0,0,.14);
    padding: 16px 16px 13px;
    position: relative;
    overflow: hidden;
  }
  .message-box::before,
  .message-box::after {
    content: "";
    position: absolute;
    top: 48px;
    bottom: 44px;
    width: 42px;
    pointer-events: none;
    z-index: 3;
  }
  .message-box::before {
    left: 16px;
    background: linear-gradient(90deg, rgba(15,18,15,.92), transparent);
  }
  .message-box::after {
    right: 16px;
    background: linear-gradient(270deg, rgba(15,18,15,.92), transparent);
  }
  .message-title {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
    color: var(--soft);
    font-size: .8rem;
    font-weight: 900;
  }
  .message-title span {
    color: var(--flow);
    font-size: .72rem;
    font-weight: 900;
  }
  .sequence-flow {
    display: flex;
    align-items: stretch;
    gap: 12px;
    overflow-x: auto;
    padding: 4px 12px 12px;
    scroll-snap-type: x proximity;
    scrollbar-color: color-mix(in srgb, var(--flow) 55%, #666) rgba(255,255,255,.08);
  }
  .sequence-flow::-webkit-scrollbar { height: 8px; }
  .sequence-flow::-webkit-scrollbar-track { background: rgba(255,255,255,.08); border-radius: 999px; }
  .sequence-flow::-webkit-scrollbar-thumb { background: var(--flow); border-radius: 999px; }
  .sequence-node {
    flex: 0 0 118px;
    border: 1px solid color-mix(in srgb, var(--flow) 52%, var(--line));
    background: color-mix(in srgb, var(--flow) 12%, var(--panel-2));
    border-radius: 15px;
    padding: 12px 10px;
    display: grid;
    justify-items: center;
    gap: 8px;
    box-shadow: 0 16px 32px rgba(0,0,0,.22);
    opacity: .42;
    transition: opacity .2s, transform .2s, border-color .2s, box-shadow .2s;
    scroll-snap-align: center;
  }
  .sequence-node.active {
    opacity: 1;
    transform: translateY(-3px);
    border-color: var(--flow);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--flow) 18%, transparent),
                0 22px 48px color-mix(in srgb, var(--flow) 28%, transparent);
  }
  .sequence-node.done {
    opacity: .72;
  }
  .sequence-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    background: rgba(255,255,255,.9);
    border: 1px solid rgba(255,255,255,.22);
  }
  .sequence-name {
    color: var(--text);
    font-weight: 900;
    font-size: .78rem;
    text-align: center;
    line-height: 1.25;
  }
  .sequence-arrow {
    flex: 0 0 92px;
    display: grid;
    align-content: center;
    gap: 7px;
    min-width: 0;
    opacity: .35;
    transition: opacity .2s;
  }
  .sequence-arrow.active {
    opacity: 1;
  }
  .sequence-line {
    position: relative;
    height: 4px;
    border-radius: 999px;
    background: var(--flow);
    box-shadow: 0 0 22px color-mix(in srgb, var(--flow) 55%, transparent);
  }
  .sequence-line::after {
    content: "";
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 11px solid var(--flow);
  }
  .sequence-label {
    color: var(--soft);
    font-size: .66rem;
    line-height: 1.3;
    text-align: center;
    min-height: 26px;
  }
  .sequence-note {
    color: var(--muted);
    font-size: .72rem;
    line-height: 1.4;
    margin: 4px 12px 0;
  }

  .step-track {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px;
    padding: 10px 26px 24px;
  }
  .step-card {
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 16px;
    padding: 15px;
    min-height: 178px;
    cursor: pointer;
    text-align: left;
    position: relative;
    overflow: hidden;
    transition: transform .2s, border-color .2s, background .2s, box-shadow .2s;
  }
  .step-card:hover { transform: translateY(-2px); border-color: var(--line-strong); }
  .step-card.done {
    border-color: color-mix(in srgb, var(--flow) 42%, var(--line));
    background: color-mix(in srgb, var(--flow) 8%, var(--panel-2));
  }
  .step-card.active {
    border-color: var(--flow);
    background: color-mix(in srgb, var(--flow) 22%, var(--panel-2));
    box-shadow: inset 0 0 0 2px var(--flow),
                0 0 0 4px color-mix(in srgb, var(--flow) 18%, transparent),
                0 22px 58px color-mix(in srgb, var(--flow) 24%, transparent);
    transform: translateY(-3px);
  }
  .step-card.active::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 7px;
    background: var(--flow);
  }
  .step-status {
    position: absolute;
    top: 14px;
    right: 14px;
    display: none;
    color: #08100b;
    background: var(--flow);
    border-radius: 999px;
    padding: 5px 9px;
    font-size: .68rem;
    font-weight: 900;
  }
  .step-card.active .step-status {
    display: inline-block;
  }
  .step-no {
    display: inline-grid;
    place-items: center;
    min-width: 66px;
    height: 28px;
    border-radius: 999px;
    background: var(--panel-3);
    color: var(--muted);
    border: 1px solid var(--line);
    font-size: .76rem;
    font-weight: 800;
  }
  .step-card.done .step-no,
  .step-card.active .step-no {
    background: var(--flow);
    border-color: var(--flow);
    color: #0b110d;
  }
  .step-card h3 {
    margin: 13px 0 7px;
    font-size: .98rem;
    line-height: 1.25;
  }
  .route {
    color: var(--flow);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: .72rem;
    line-height: 1.45;
    word-break: keep-all;
  }
  .step-copy {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: .78rem;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .step-hint {
    margin-top: 12px;
    color: var(--soft);
    font-size: .72rem;
    line-height: 1.45;
    border-top: 1px solid color-mix(in srgb, var(--flow) 22%, var(--line));
    padding-top: 12px;
  }

  .detail {
    position: sticky;
    top: 16px;
    overflow: hidden;
  }
  .detail-head {
    padding: 19px 20px 16px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--flow) 10%, var(--panel));
  }
  .detail-kicker {
    display: inline-block;
    margin-bottom: 10px;
    color: var(--flow);
    font-size: .76rem;
    font-weight: 900;
  }
  .detail h2 {
    margin: 0;
    font-size: 1.15rem;
    line-height: 1.35;
  }
  .detail-route {
    margin-top: 8px;
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: .75rem;
    line-height: 1.45;
  }
  .detail-body {
    padding: 16px 20px 20px;
    display: grid;
    gap: 12px;
  }
  .info-block {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 13px 14px;
    background: rgba(0,0,0,.13);
  }
  .info-block h3 {
    margin: 0 0 9px;
    font-size: .8rem;
    color: var(--text);
  }
  .info-block ul {
    margin: 0;
    padding-left: 17px;
    color: var(--soft);
    line-height: 1.55;
    font-size: .82rem;
  }
  .payload {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    background: #0b0d0b;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    color: #d7ddd4;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: .76rem;
    line-height: 1.55;
  }

  @media (max-width: 980px) {
    header { display: block; }
    .summary-pill { display: inline-block; margin-top: 14px; }
    .flow-tabs { grid-template-columns: 1fr; }
    .workspace { grid-template-columns: 1fr; }
    .detail { position: static; }
    .step-track { grid-template-columns: 1fr; }
    .actor-strip {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .actor-cell {
      grid-template-columns: 48px 1fr;
      justify-items: start;
      text-align: left;
    }
    .actor-cell:not(:last-child)::after {
      display: none;
    }
    .actor-name { text-align: left; min-height: 0; align-self: center; }
    .sequence-flow { align-items: stretch; }
    .sequence-node { flex-basis: 118px; }
    .sequence-arrow { flex-basis: 84px; }
  }

  @media (max-width: 620px) {
    .wrap { width: min(100vw - 22px, 1380px); padding-top: 18px; }
    .board-head { display: block; padding: 19px; }
    .flow-badge { display: inline-block; margin-top: 12px; }
    .actor-strip, .step-track { padding-left: 18px; padding-right: 18px; }
    .stage-rail { overflow-x: auto; padding-bottom: 4px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <p class="eyebrow">ERP communication flow</p>
      <h1>현대 파츠 ERP — 호출별 상세 플로우</h1>
      <p class="header-copy">호출 흐름을 반복 노드가 있는 시퀀스로 보여줍니다. 카드를 누르면 해당 구간과 우측 상세가 함께 바뀝니다.</p>
    </div>
    <div class="summary-pill">로그인 · 대시보드 BFF · 일반 서비스 API</div>
  </header>

  <nav class="flow-tabs" id="flowTabs" aria-label="호출 플로우 선택"></nav>
  <div class="stage-rail" id="stageRail" aria-label="단계 선택"></div>

  <div class="workspace">
    <main class="board">
      <div class="board-head">
        <div class="board-title">
          <h2 id="flowTitle"></h2>
          <p id="flowSummary"></p>
        </div>
        <div class="flow-badge" id="flowBadge"></div>
      </div>
      <div class="message-map" id="messageMap"></div>
      <div class="step-track" id="stepTrack"></div>
    </main>

    <aside class="detail" id="detailPanel" aria-live="polite"></aside>
  </div>
</div>

<script>
const flows = {
  login: {
    tab: "로그인",
    tabDesc: "OIDC 인증과 httpOnly 쿠키 발급",
    color: "#40bfc1",
    title: "로그인 플로우",
    badge: "Gateway Auth → httpOnly Cookie",
    summary: "Gateway가 Keycloak과 토큰을 교환하고, 브라우저에는 `ERP_SESSION` httpOnly 쿠키만 내려줍니다.",
    actors: ["Browser", "Gateway Auth", "Keycloak", "User Service"],
    steps: [
      {
        title: "보호 화면 접근",
        route: "Browser → Gateway Auth",
        chain: [
          { actor: "Browser" },
          { actor: "Gateway Auth", label: "GET /dashboard" }
        ],
        messages: [
          { from: "Browser", to: "Gateway Auth", label: "GET /dashboard · 쿠키 없음" },
          { from: "Gateway Auth", to: "Browser", label: "302 /auth/login 시작" }
        ],
        progress: 1,
        copy: "사용자가 대시보드 같은 보호 화면에 접근합니다. 아직 유효한 `ERP_SESSION` 쿠키가 없으면 Gateway가 로그인 플로우를 시작합니다.",
        send: [
          "Browser: GET /dashboard 또는 GET /auth/login?redirect=/dashboard",
          "Cookie: 없음 또는 만료된 ERP_SESSION"
        ],
        receive: [
          "Gateway Auth: 원래 가려던 redirect 경로",
          "Gateway Auth: 현재 요청에 유효한 로그인 쿠키가 없다는 상태"
        ],
        process: [
          "보호 리소스 접근인지 확인",
          "기존 ERP_SESSION 쿠키가 유효한지 확인",
          "로그인 완료 후 돌아갈 redirect 경로를 보존"
        ],
        payload: "GET /dashboard HTTP/1.1\nHost: erp.example.com\nCookie: (없음)\n\n→ Gateway Auth가 /auth/login 흐름 시작"
      },
      {
        title: "Keycloak으로 이동",
        route: "Gateway Auth → Keycloak",
        chain: [
          { actor: "Gateway Auth" },
          { actor: "Keycloak", label: "authorize redirect" }
        ],
        messages: [
          { from: "Gateway Auth", to: "Browser", label: "302 Keycloak authorize URL" },
          { from: "Browser", to: "Keycloak", label: "GET /authorize" }
        ],
        progress: 3,
        copy: "Gateway가 state, nonce, PKCE 값을 만들고 브라우저를 Keycloak 인증 화면으로 리다이렉트합니다.",
        send: [
          "Gateway Auth: client_id, redirect_uri, response_type=code",
          "Gateway Auth: state, nonce, code_challenge",
          "Browser: Keycloak authorize URL로 이동"
        ],
        receive: [
          "Browser: 302 Location = Keycloak authorization endpoint",
          "Gateway Auth: state/code_verifier를 나중에 검증할 수 있는 임시 보호값"
        ],
        process: [
          "CSRF 방어용 state 생성",
          "id_token 재사용 방지용 nonce 생성",
          "code_verifier는 서버 보관 또는 서명된 임시 쿠키로 보호"
        ],
        payload: "302 Location: /realms/erp/protocol/openid-connect/auth\n  ?client_id=erp-gateway\n  &redirect_uri=https://erp.example.com/auth/callback\n  &response_type=code\n  &scope=openid profile email\n  &state=st_9ad31\n  &nonce=n_60be7\n  &code_challenge=cc_t7W...\n  &code_challenge_method=S256"
      },
      {
        title: "로그인 콜백 수신",
        route: "Keycloak → Gateway Auth",
        chain: [
          { actor: "Keycloak" },
          { actor: "Gateway Auth", label: "callback code&state" }
        ],

          "401/403/5xx를 프론트가 처리할 수 있는 형태로 통일",
          "토큰 값은 응답 body에 포함하지 않음"
        ],
        payload: "HTTP/1.1 200 OK\nContent-Type: application/json\n\n{\n  \"partNo\": \"P-1004\",\n  \"branchId\": \"BR-002\",\n  \"availableQty\": 18,\n  \"reservedQty\": 3\n}"
      }
    ]
  }
};

let currentFlow = "login";
let currentStep = 0;

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function initials(label) {
  return label
    .split(/\s+/)
    .map(part => part[0])
    .join("")
    .slice(0, 3)
    .toUpperCase();
}

const ICONS = {
  Browser: "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/chrome/chrome-original.svg",
  Keycloak: "https://cdn.simpleicons.org/keycloak/4D4D4D",
  "Gateway Auth": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg",
  "API Gateway": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg",
  "Dashboard BFF": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg",
  "Domain Services": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg",
  "Inventory Service": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg",
  "User Service": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg",
  "Inventory DB": "https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/postgresql/postgresql-original.svg"
};

function actorIcon(actor) {
  const src = ICONS[actor] || ICONS["API Gateway"];
  return `<img src="${src}" alt="${escapeHtml(actor)} logo" onerror="this.replaceWith(document.createTextNode('${initials(actor)}'))">`;
}

function renderTabs() {
  const tabs = document.getElementById("flowTabs");
  tabs.innerHTML = Object.entries(flows).map(([key, flow]) => `
    <button class="flow-tab ${key === currentFlow ? "active" : ""}" data-flow="${key}" style="--flow:${flow.color}">
      <b>${flow.tab}</b>
      <span>${flow.tabDesc}</span>
    </button>
  `).join("");
  tabs.querySelectorAll(".flow-tab").forEach(button => {
    button.addEventListener("click", () => {
      currentFlow = button.dataset.flow;
      currentStep = 0;
      render();
    });
  });
}

function renderStageRail(flow) {
  const rail = document.getElementById("stageRail");
  rail.innerHTML = flow.steps.map((step, index) => `
    <button class="stage-btn ${index < currentStep ? "done" : ""} ${index === currentStep ? "active" : ""}" data-step="${index}" style="--flow:${flow.color}">
      ${index + 1}단계
    </button>
  `).join("");
  rail.querySelectorAll(".stage-btn").forEach(button => {
    button.addEventListener("click", () => {
      currentStep = Number(button.dataset.step);
      render();
    });
  });
}

function renderActors(flow, step) {
  const strip = document.getElementById("actorStrip");
  if (!strip) return;
  strip.style.setProperty("--count", flow.actors.length);
  strip.style.setProperty("--flow", flow.color);
  const involved = new Set((step.chain || []).map(point => point.actor));
  strip.innerHTML = flow.actors.map((actor, index) => {
    const on = involved.has(actor);
    return `
      <div class="actor-cell ${on ? "on focus" : ""}">
        <div class="actor-mark">${actorIcon(actor)}</div>
        <div class="actor-name">${actor}</div>
      </div>
    `;
  }).join("");
}

function buildJourney(flow) {
  const nodes = [];
  const ranges = [];

  flow.steps.forEach(step => {
    const start = Math.max(0, nodes.length - 1);
    (step.chain || []).forEach(point => {
      const last = nodes[nodes.length - 1];
      if (last && last.actor === point.actor) return;
      nodes.push(point);
    });
    ranges.push({ start, end: Math.max(start, nodes.length - 1) });
  });

  return { nodes, ranges };
}

function renderMessages(flow, step) {
  const map = document.getElementById("messageMap");
  map.style.setProperty("--flow", flow.color);
  const { nodes, ranges } = buildJourney(flow);
  const activeRange = ranges[currentStep] || { start: 0, end: 0 };
  map.innerHTML = `
    <div class="message-box">
      <div class="message-title">
        <strong>전체 호출 플로우</strong>
        <span>반복 노드를 그대로 표시</span>
      </div>
      <div class="sequence-flow">
        ${nodes.map((point, index) => {
          const activeNode = index >= activeRange.start && index <= activeRange.end;
          const doneNode = index < activeRange.start;
          const activeArrow = index > activeRange.start && index <= activeRange.end;
          return `
          ${index === 0 ? "" : `
            <div class="sequence-arrow ${activeArrow ? "active" : ""}">
              <div class="sequence-label">${escapeHtml(point.label || "")}</div>
              <div class="sequence-line"></div>
            </div>
          `}
          <div class="sequence-node ${activeNode ? "active" : ""} ${doneNode ? "done" : ""}">
            <div class="sequence-icon">${actorIcon(point.actor)}</div>
            <div class="sequence-name">${escapeHtml(point.actor)}</div>
          </div>
        `}).join("")}
      </div>
      <div class="sequence-note">단계 카드를 클릭하면 전체 시퀀스 중 해당 구간만 강조됩니다. 같은 서비스가 여러 번 등장하면 그 순서 그대로 다시 그립니다.</div>
    </div>
  `;
  const activeNode = map.querySelector(".sequence-node.active");
  if (activeNode) {
    activeNode.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  }
}

function renderSteps(flow) {
  const track = document.getElementById("stepTrack");
  track.innerHTML = flow.steps.map((step, index) => `
    <button class="step-card ${index < currentStep ? "done" : ""} ${index === currentStep ? "active" : ""}" data-step="${index}" style="--flow:${flow.color}">
      <span class="step-status">현재 단계</span>
      <span class="step-no">${index + 1}단계</span>
      <h3>${step.title}</h3>
      <div class="route">${step.route}</div>
      <p class="step-copy">${step.copy}</p>
      <div class="step-hint">전송값 · 응답값 · 처리 책임은 우측 패널</div>
    </button>
  `).join("");
  track.querySelectorAll(".step-card").forEach(button => {
    button.addEventListener("click", () => {
      currentStep = Number(button.dataset.step);
      render();
    });
  });
}

function listItems(items) {
  return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
}

function renderDetail(flow, step) {
  const panel = document.getElementById("detailPanel");
  panel.style.setProperty("--flow", flow.color);
  panel.innerHTML = `
    <div class="detail-head">
      <span class="detail-kicker">${flow.tab} · ${currentStep + 1}단계</span>
      <h2>${step.title}</h2>
      <div class="detail-route">${step.route}</div>
    </div>
    <div class="detail-body">
      <section class="info-block">
        <h3>보내는 것</h3>
        <ul>${listItems(step.send)}</ul>
      </section>
      <section class="info-block">
        <h3>받는 것</h3>
        <ul>${listItems(step.receive)}</ul>
      </section>
      <section class="info-block">
        <h3>처리하는 것</h3>
        <ul>${listItems(step.process)}</ul>
      </section>
      <pre class="payload">${escapeHtml(step.payload)}</pre>
    </div>
  `;
}

function render() {
  const flow = flows[currentFlow];
  const step = flow.steps[currentStep];
  document.documentElement.style.setProperty("--flow", flow.color);
  document.getElementById("flowTitle").textContent = flow.title;
  document.getElementById("flowSummary").textContent = flow.summary;
  document.getElementById("flowBadge").textContent = flow.badge;
  renderTabs();
  renderStageRail(flow);
  renderMessages(flow, step);
  renderSteps(flow);
  renderDetail(flow, step);
}

render();
</script>
</body>
</html>
